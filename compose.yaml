name: fall-detection-web-app

services:
  server:
    image: fall-detection-web-server:dev
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        USER_ID: ${HOST_UID:-1000}
        GROUP_ID: ${HOST_GID:-1000}
    environment:
      CAMERA_API_TOKEN: ${CAMERA_API_TOKEN:-change-me-development-token}
      DATABASE_PATH: ${DATABASE_PATH:-/data/fall_detection.sqlite3}
      VIDEO_DIR: ${VIDEO_DIR:-/data/videos}
      MAX_VIDEO_UPLOAD_BYTES: ${MAX_VIDEO_UPLOAD_BYTES:-52428800}
      SESSION_SECRET: ${SESSION_SECRET:-development-session-secret-please-change-32}
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
      MONITOR_USERNAME: ${MONITOR_USERNAME:-admin}
      MONITOR_PASSWORD_HASH: ${MONITOR_PASSWORD_HASH:-pbkdf2_sha256:260000:ZmFsbC1kZW1vLWFkbWlu:tcQHQcZZ13ziZCIsA1snbLFBRRkpIogw7nRWAep8jP0}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-28800}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    ports:
      - "${SERVER_PORT:-8000}:8000"
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - ./src/server/app:/app/app
      - ./data:/data
    init: true
    networks:
      - fall-monitor-network

  camera:
    image: fall-detection-web-camera:dev
    build:
      context: .
      dockerfile: Dockerfile.camera
      args:
        USER_ID: ${HOST_UID:-1000}
        GROUP_ID: ${HOST_GID:-1000}
    environment:
      CAMERA_DEVICE: ${CAMERA_DEVICE:-/dev/video0}
      CAMERA_WIDTH: ${CAMERA_WIDTH:-640}
      CAMERA_HEIGHT: ${CAMERA_HEIGHT:-480}
      CAMERA_API_TOKEN: ${CAMERA_API_TOKEN:-change-me-development-token}
      SERVER_BASE_URL: ${SERVER_BASE_URL:-http://server:8000}
      PROCESS_FPS: ${PROCESS_FPS:-10}
      MODEL_PATH: ${MODEL_PATH:-yolo26n-pose.pt}
      POSE_DEVICE: ${POSE_DEVICE:-0}
      POSE_CONFIDENCE: ${POSE_CONFIDENCE:-0.5}
      POSE_IMAGE_SIZE: ${POSE_IMAGE_SIZE:-640}
      SHOW_WINDOW: ${SHOW_WINDOW:-true}
      MAX_CAMERA_READ_FAILURES: ${MAX_CAMERA_READ_FAILURES:-10}
      FALL_CANDIDATE_SECONDS: ${FALL_CANDIDATE_SECONDS:-1.0}
      FALL_BBOX_ASPECT_THRESHOLD: ${FALL_BBOX_ASPECT_THRESHOLD:-1.15}
      FALL_TORSO_ANGLE_THRESHOLD: ${FALL_TORSO_ANGLE_THRESHOLD:-60.0}
      DISPLAY: ${DISPLAY:-:0}
      QT_QPA_FONTDIR: ${QT_QPA_FONTDIR:-/usr/share/fonts/truetype/dejavu}
    depends_on:
      - server
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    group_add:
      - "${VIDEO_GID:-44}"
    volumes:
      - ./src/camera/app:/app/app
      - ./data/camera-output:/app/output
      - ./models:/app/models:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    devices:
      - "${HOST_CAMERA_DEVICE:-/dev/video0}:${CONTAINER_CAMERA_DEVICE:-/dev/video0}"
    gpus: all
    command: ["python", "-m", "app.main"]
    init: true
    stdin_open: true
    tty: true
    networks:
      - fall-monitor-network

networks:
  fall-monitor-network:
    driver: bridge
