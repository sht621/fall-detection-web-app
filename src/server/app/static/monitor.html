<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>転倒検知モニター</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <header class="topbar">
      <h1>転倒検知モニター</h1>
      <div class="topbar-status">
        <p id="current-user" class="current-user"></p>
        <button id="logout" class="secondary-button" type="button" hidden>ログアウト</button>
        <p id="sse-status" class="connection disconnected">SSE 未接続</p>
      </div>
    </header>
    <main>
      <p id="notification" class="notification" role="status" aria-live="polite"></p>
      <section id="login-panel" class="login-panel" hidden>
        <h2>ログイン</h2>
        <form id="login-form" class="login-form">
          <label>
            ユーザー名
            <input id="login-username" name="username" autocomplete="username" required>
          </label>
          <label>
            パスワード
            <input id="login-password" name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">ログイン</button>
        </form>
      </section>
      <section class="layout" aria-label="転倒イベント確認" hidden>
        <section class="event-panel">
          <h2>イベント一覧</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>カメラ ID</th>
                  <th>検知日時</th>
                  <th>動画</th>
                  <th>確認</th>
                </tr>
              </thead>
              <tbody id="detection-list"></tbody>
            </table>
          </div>
        </section>
        <section class="detail-panel">
          <h2>映像確認</h2>
          <p id="selected-summary" class="selected-summary">イベントを選択してください。</p>
          <video id="video-player" controls preload="metadata"></video>
          <div class="review-actions">
            <button id="confirm-fall" type="button" disabled>転倒を確認</button>
            <button id="reject-fall" type="button" disabled>転倒ではない</button>
            <button id="delete-event" class="danger-button" type="button" disabled>削除</button>
          </div>
        </section>
      </section>
    </main>
    <script src="/static/app.js" defer></script>
  </body>
</html>
